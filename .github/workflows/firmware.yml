name: Build firmware

permissions:
  contents: read
  pull-requests: write
  
on:
  workflow_call:
    outputs:
      version:
        description: 000N
        value: ${{ jobs.build-hex.outputs.version }}
  workflow_dispatch:

  push:

jobs:
  build-hex:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.define_version.outputs.firmware_version }}
      
    steps:
      - name: define version
        id: define_version
        env:
          XVERSION: "0x0007"
        run: | 
          echo "firmware_version=${XVERSION}" >> $GITHUB_OUTPUT
          echo "VERSION=${XVERSION:2:4}" >> $GITHUB_ENV
        shell: bash

      - name : Checkout repository
        uses: actions/checkout@v4
       
      - name : make 01
        uses: bazhenov/action-avr-make@v1.1
        with:
          dir: AVR_Code/USB_BULK_TEST
          target: '01'

      - name : make clean
        uses: bazhenov/action-avr-make@v1.1
        with:
          dir: AVR_Code/USB_BULK_TEST
          target: clean_o_d

      - name : make 02
        uses: bazhenov/action-avr-make@v1.1
        with:
          dir: AVR_Code/USB_BULK_TEST
          target: '02'

      - name: Upload hex artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asset-hex
          path: AVR_Code/USB_BULK_TEST/labrafirm*.hex
          compression-level: 0
          if-no-files-found: error
