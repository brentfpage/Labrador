name: Build firmware

permissions:
  contents: read
  pull-requests: write
  
on:
  workflow_call:
    outputs:
      version:
        description: 000N
        value: ${{ steps.export_version.outputs.VERSION }}
  workflow_dispatch:

  push:

env:
  VERSION: "0007"

jobs:
  build-hex:
    runs-on: ubuntu-latest
      
    steps:
      - name: export version
        id: export_version
        run: echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
        shell: bash

      - name : Checkout repository
        uses: actions/checkout@v4
       
      - name : make 01
        uses: bazhenov/action-avr-make@v1.1
        with:
          dir: AVR_Code/USB_BULK_TEST
          target: '01'

      - name : make clean
        uses: bazhenov/action-avr-make@v1.1
        with:
          dir: AVR_Code/USB_BULK_TEST
          target: clean_o_d

      - name : make 02
        uses: bazhenov/action-avr-make@v1.1
        with:
          dir: AVR_Code/USB_BULK_TEST
          target: '02'

      - name: Upload hex artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asset-hex
          path: AVR_Code/USB_BULK_TEST/labrafirm*.hex
          compression-level: 0
          if-no-files-found: error
